<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MorseiFy</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="navbar">
      <h1>
        <a href="index.html" class="logo">
          <img src="logo.png" />
          MorseiFy
        </a>
      </h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="reverse.html">Reverse</a></li>
        <li><a href="learn.html">Learn Morse</a></li>
        <li><a href="about.html">About Me</a></li>
      </ul>
    </div>
    <div id="main-container">
      <div id="title">English Text Generator</div>
      <div id="instruction">Type Morse Code and convert it to English Text</div>
      <div id="inout">
        <div id="input">
          <p>1. Enter Morse Code</p>
          <textarea id="input-text"></textarea>
        </div>
        <div id="arrow">
          <img src="arrow.jpg" alt="→" />
        </div>
        <div id="output">
          <p>2. English Text Output</p>
          <textarea id="output-text" readonly></textarea>
        </div>
      </div>
      <div class="buttons">
        <button id="revconvert">Convert</button>
        <button id="copy">Copy</button>
      </div>
    </div>
    <div id="indication">
      <div id="guide">
        <div>
          <i class="fa-solid fa-lightbulb"></i>
          <b>LIGHT INDICATION</b><br />
          Watch the light blink as per your Morse Code
        </div>
      </div>
      <div id="light"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
